<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechnoCamp 2026 – Copilot Agenter</title>
    <meta
      name="description"
      content="Quiz og modultrening for TechnoCamp 2026: Copilot Agenter."
    />
    <link rel="stylesheet" href="./styles.css?v=2026-03-30-1" />
    <script defer src="./app.js?v=2026-03-30-1"></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="hero__copy">
          <p class="eyebrow">TechnoCamp 2026</p>
          <h1>Copilot Agenter</h1>
          <p class="hero__lead">
            Test hva du har lært  🧪🏆
          </p>
        </div>

        <section class="panel hero__progress" aria-labelledby="progress-title">
          <div class="hero__progress-head">
            <p class="hero__progress-kicker">Status akkurat nå</p>
            <h2 id="progress-title">Fremdrift</h2>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="stat__label">Moduler fullført</span>
              <strong id="completed-modules">0/0</strong>
            </div>
            <div class="stat">
              <span class="stat__label">Riktige svar</span>
              <strong id="correct-answers">0/0</strong>
            </div>
            <div class="stat">
              <span class="stat__label">Total progresjon</span>
              <strong id="overall-progress">0%</strong>
            </div>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div id="progress-fill" class="progress-bar__fill"></div>
          </div>
          <button id="reset-progress" class="button button--ghost" type="button">
            Nullstill fremdrift
          </button>
        </section>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel panel--sticky">
          <h2>Moduler</h2>
          <nav id="module-nav" class="module-nav" aria-label="Velg modul"></nav>
        </section>
      </aside>

      <main id="module-view" class="content" aria-live="polite"></main>
    </div>
  </body>
</html>
